<!-- Firebase SDK is loaded dynamically at boot (non-blocking) so a stalled network can never freeze the page. -->
<style>
:root{
  --teal:#00818D; --teal-dark:#016671; --teal-deep:#0A5860; --teal-tint:#E5F3F4; --teal-tint2:#F0F8F8;
  --gold:#FFAC27; --gold-dark:#E8951A; --gold-tint:#FFF4E0;
  --ink:#1F2A2D; --warm:#8A7E78; --muted:#9A9089;
  --cream:#FBF7F1; --surface:#FFFFFF; --border:#EAE3DA; --border-2:#DDD4C8; --mid:#4A5A66;
  --green:#2E9E6B; --green-tint:#E7F5EE; --red:#D94F4F; --red-tint:#FBEDED;
  --shadow-sm:0 1px 2px rgba(31,42,45,.05);
  --shadow:0 1px 3px rgba(31,42,45,.06), 0 6px 20px rgba(31,42,45,.07);
  --shadow-lg:0 12px 40px rgba(31,42,45,.16);
  --r:12px; --r-sm:8px; --r-lg:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Barlow',system-ui,sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.cond{font-family:'Barlow Condensed',sans-serif}
.eyebrow{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.11em;font-weight:700}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
img{max-width:100%;display:block}
a{color:var(--teal);text-decoration:none}
::selection{background:var(--teal-tint)}
.hide{display:none !important}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:var(--r-sm);font-weight:600;font-size:14px;transition:.15s;white-space:nowrap;border:1px solid transparent}
.btn svg{width:17px;height:17px}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal-dark)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-gold:hover{background:var(--gold-dark)}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--border-2)}
.btn-ghost:hover{background:var(--cream);border-color:var(--warm)}
.btn-soft{background:var(--teal-tint);color:var(--teal-dark)}
.btn-soft:hover{background:#d5ecec}
.btn-sm{padding:6px 11px;font-size:13px}
.btn-sm svg{width:15px;height:15px}
.btn-lg{padding:13px 22px;font-size:15px}
.btn-block{width:100%;justify-content:center}
.icon-btn{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--r-sm);color:var(--warm);transition:.15s}
.icon-btn svg{width:18px;height:18px}
.icon-btn:hover{background:var(--cream);color:var(--ink)}
/* Auth */
#boot{position:fixed;inset:0;z-index:600;background:linear-gradient(160deg,var(--teal-deep),var(--teal));display:flex;align-items:center;justify-content:center;animation:bootAway .4s ease 2.8s forwards}
@keyframes bootAway{to{opacity:0;visibility:hidden}}
#boot .bootcard{display:flex;flex-direction:column;align-items:center;gap:20px}
#boot img{width:64px;height:64px;border-radius:15px;box-shadow:var(--shadow-sm)}
#boot .spin{width:30px;height:30px;border:3px solid rgba(255,255,255,.28);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#buildTag{position:fixed;bottom:6px;right:8px;z-index:700;font:10px/1 ui-monospace,Menlo,monospace;color:rgba(120,120,120,.55);pointer-events:none;letter-spacing:.02em}
.video-box iframe{width:100%;aspect-ratio:16/9;border:0;display:block;background:#000}
#auth{position:fixed;inset:0;z-index:500;background:linear-gradient(160deg,var(--teal-deep),var(--teal));display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto}
.authcard{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:410px;padding:34px 34px 30px}
.authcard .brand{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:22px}
.authcard .brand img{width:58px;height:58px;border-radius:14px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.authcard h1{font-family:'Barlow Condensed';font-weight:800;font-size:27px;text-transform:uppercase;letter-spacing:.02em;line-height:1}
.authcard .sub{font-family:'Barlow Condensed';font-weight:600;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-top:5px}
.authcard .field{margin-bottom:14px}
.authcard label{display:block;font-weight:600;font-size:13px;margin-bottom:5px}
.authcard input{width:100%;padding:11px 13px;border:1px solid var(--border-2);border-radius:var(--r-sm);outline:none;transition:.15s}
.authcard input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-tint)}
.authcard .btn{width:100%;justify-content:center;margin-top:6px}
.authcard .toggle{text-align:center;font-size:13.5px;color:var(--warm);margin-top:16px}
.authcard .toggle a{font-weight:600;cursor:pointer}
.authcard .err{color:var(--red);font-size:13px;margin-top:10px;min-height:16px;text-align:center}
.authcard .ym{font-family:'Lora';font-style:italic;color:var(--teal);text-align:center;margin-top:18px}
.modewarn{background:var(--gold-tint);border:1px solid #f4dfae;border-radius:var(--r-sm);padding:9px 12px;font-size:12.5px;color:#8a6d1f;margin-bottom:16px;text-align:center}
/* Shell */
#app{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;gap:16px;padding:13px 26px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40}
.topbar .logo{display:flex;align-items:center;gap:11px;cursor:pointer}
.topbar .logo img{width:34px;height:34px;border-radius:9px}
.topbar .logo .wm b{font-family:'Barlow Condensed';font-weight:800;font-size:18px;letter-spacing:.02em;text-transform:uppercase;display:block;line-height:1}
.topbar .logo .wm span{font-family:'Barlow Condensed';font-weight:600;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--teal)}
.topbar .tabs{display:flex;gap:4px;margin-left:14px}
.topbar .tabs button{padding:8px 14px;border-radius:var(--r-sm);font-weight:600;font-size:14px;color:var(--warm)}
.topbar .tabs button:hover{background:var(--cream);color:var(--ink)}
.topbar .tabs button.on{background:var(--teal-tint);color:var(--teal-dark)}
.topbar .spacer{flex:1}
.topbar .who{display:flex;align-items:center;gap:10px;font-size:13.5px}
.topbar .who .av{width:34px;height:34px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:700;font-size:15px}
.topbar .who .nm{font-weight:600;line-height:1.1}
.topbar .who .rl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.page{padding:30px;max-width:1120px;width:100%;margin:0 auto;flex:1}
.hero{margin-bottom:26px}
.hero h1{font-family:'Barlow Condensed';font-weight:800;font-size:38px;line-height:1;letter-spacing:.01em;text-transform:uppercase}
.hero h1 em{font-style:italic;color:var(--teal)}
.hero p{color:var(--warm);margin-top:8px;font-size:15.5px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:8px 0 15px}
.sec-head h2{font-family:'Barlow Condensed';font-weight:700;font-size:20px;text-transform:uppercase;letter-spacing:.04em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px}
/* Course card */
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);transition:.16s;cursor:pointer;display:flex;flex-direction:column}
.ccard:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.ccard .top{height:96px;position:relative;display:flex;align-items:flex-end;padding:14px 16px}
.ccard .top h3{position:relative;color:#fff;font-family:'Barlow Condensed';font-weight:700;font-size:21px;line-height:1.05;text-shadow:0 1px 8px rgba(0,0,0,.25)}
.ccard .top .badge{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.9);color:var(--ink);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.ccard .body{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column}
.ccard .body p{color:var(--warm);font-size:13.5px;line-height:1.45;flex:1}
.ccard .stat{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);margin-top:12px}
.pbar{height:7px;border-radius:20px;background:var(--border);overflow:hidden;margin-top:12px}
.pbar i{display:block;height:100%;background:var(--teal);border-radius:20px;transition:width .4s}
.pbar.done i{background:var(--green)}
.pct{font-weight:700;color:var(--teal-dark);font-size:12.5px}
.empty{text-align:center;padding:64px 20px;color:var(--muted)}
.empty svg{width:52px;height:52px;color:var(--border-2);margin-bottom:12px}
.empty h3{font-family:'Barlow Condensed';font-weight:700;font-size:21px;text-transform:uppercase;color:var(--warm);margin-bottom:6px}
.empty p{max-width:380px;margin:0 auto 16px}
/* Course detail */
.crumb{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--warm);margin-bottom:16px}
.crumb a{cursor:pointer;font-weight:600}
.crumb svg{width:14px;height:14px}
.course-head{display:flex;gap:24px;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap}
.course-head .ci{flex:1;min-width:260px}
.course-head h1{font-family:'Barlow Condensed';font-weight:800;font-size:34px;line-height:1.05;text-transform:uppercase}
.course-head p{color:var(--warm);font-size:16px;margin-top:10px;max-width:640px}
.course-head .side{flex:0 0 260px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow-sm)}
.course-head .side .big{font-family:'Barlow Condensed';font-weight:800;font-size:32px;color:var(--teal)}
.chapter{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow-sm)}
.chapter .chd{display:flex;align-items:center;gap:12px;padding:15px 18px;cursor:pointer;user-select:none}
.chapter .chd .cn{width:30px;height:30px;border-radius:8px;background:var(--teal-tint);color:var(--teal-dark);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:700;font-size:15px;flex:0 0 30px}
.chapter .chd h3{font-family:'Barlow Condensed';font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:.02em;flex:1}
.chapter .chd .meta{font-size:12.5px;color:var(--muted);font-weight:600}
.chapter .chd .chev{transition:.2s;color:var(--warm)}
.chapter.open .chd .chev{transform:rotate(90deg)}
.chapter .lessons{display:none;border-top:1px solid var(--border)}
.chapter.open .lessons{display:block}
.lrow{display:flex;align-items:center;gap:13px;padding:13px 18px 13px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:.12s}
.lrow:last-child{border-bottom:none}
.lrow:hover{background:var(--cream)}
.lrow .tick{width:24px;height:24px;border-radius:50%;border:2px solid var(--border-2);flex:0 0 24px;display:flex;align-items:center;justify-content:center;color:#fff}
.lrow.done .tick{background:var(--green);border-color:var(--green)}
.lrow.done .tick svg{width:14px;height:14px}
.lrow .ic{width:32px;height:32px;border-radius:7px;background:var(--teal-tint2);color:var(--teal);display:flex;align-items:center;justify-content:center;flex:0 0 32px}
.lrow .ic svg{width:17px;height:17px}
.lrow .ic.vid{background:var(--gold-tint);color:var(--gold-dark)}
.lrow .lt{flex:1}
.lrow .lt b{font-weight:600;font-size:15px;display:block}
.lrow .lt span{font-size:12.5px;color:var(--muted)}
.lrow .go{color:var(--warm)}
/* Lesson viewer */
.lesson-wrap{display:flex;gap:24px;align-items:flex-start}
.lesson-main{flex:1;min-width:0}
.lesson-side{flex:0 0 280px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm);position:sticky;top:80px;overflow:hidden}
.lesson-side .lsh{padding:13px 16px;border-bottom:1px solid var(--border);font-family:'Barlow Condensed';font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:var(--warm)}
.lesson-side .lsi{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13.5px}
.lesson-side .lsi:last-child{border-bottom:none}
.lesson-side .lsi:hover{background:var(--cream)}
.lesson-side .lsi.cur{background:var(--teal-tint2)}
.lesson-side .lsi .d{width:18px;height:18px;border-radius:50%;border:2px solid var(--border-2);flex:0 0 18px;display:flex;align-items:center;justify-content:center;color:#fff}
.lesson-side .lsi.done .d{background:var(--green);border-color:var(--green)}
.lesson-side .lsi.done .d svg{width:11px;height:11px}
.lesson-side .lsi b{font-weight:600}
.video-box{background:#000;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:22px}
.video-box video{width:100%;display:block;max-height:70vh;background:#000}
.lesson-title{font-family:'Barlow Condensed';font-weight:800;font-size:30px;text-transform:uppercase;letter-spacing:.01em;line-height:1.05;margin-bottom:6px}
.lesson-kind{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--teal-dark);background:var(--teal-tint);padding:4px 10px;border-radius:20px;margin-bottom:16px}
.lesson-kind svg{width:13px;height:13px}
.lesson-nav{display:flex;justify-content:space-between;gap:12px;margin-top:30px;padding-top:22px;border-top:1px solid var(--border)}
.donebar{background:var(--green-tint);border:1px solid #bfe6d2;color:#1f7a52;border-radius:var(--r);padding:13px 16px;display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px;margin-bottom:20px}
.donebar svg{width:18px;height:18px}
/* Guide render (compact, ported) */
.gdoc{max-width:760px}
.gdoc .gh{margin-bottom:22px}
.gdoc h1.gt{font-family:'Barlow Condensed';font-weight:800;font-size:30px;line-height:1.08}
.gdoc .gd{color:var(--warm);font-size:16px;margin-top:10px}
.gstep{display:flex;gap:16px;padding:22px 0;border-top:1px solid var(--border)}
.gstep .num{flex:0 0 34px;height:34px;border-radius:50%;background:var(--teal);color:#fff;font-family:'Barlow Condensed';font-weight:700;font-size:17px;display:flex;align-items:center;justify-content:center}
.gstep .gb{flex:1;min-width:0}
.gstep .gtx{font-size:16px;line-height:1.55;margin-bottom:12px}
.gshot{position:relative;border:1px solid var(--border-2);border-radius:var(--r);overflow:hidden;background:var(--cream)}
.gshot img{width:100%;display:block}
.anno-layer{position:absolute;inset:0;pointer-events:none}
.pb-dot{position:absolute;width:30px;height:30px;transform:translate(-50%,-50%);border-radius:50%;border:3px solid var(--gold);background:rgba(255,172,39,.28);box-shadow:0 0 0 3px rgba(255,255,255,.6)}
.pb-box{position:absolute;border:3px solid var(--gold);border-radius:5px;box-shadow:0 0 0 2px rgba(255,255,255,.5)}
.pb-atext{position:absolute;background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:5px 10px;border-radius:7px;transform:translate(-50%,-50%);white-space:nowrap;box-shadow:var(--shadow)}
.gcallout{padding:14px 16px;border-radius:var(--r);display:flex;gap:12px;font-size:14.5px;line-height:1.5;margin:18px 0}
.gcallout svg{width:20px;height:20px;flex:0 0 20px}
.gcallout.tip{background:var(--teal-tint2);border:1px solid #cfe8e9}.gcallout.tip svg{color:var(--teal)}
.gcallout.alert{background:var(--gold-tint);border:1px solid #f4dfae}.gcallout.alert svg{color:var(--gold-dark)}
.gcallout.note{background:var(--cream);border:1px solid var(--border-2)}.gcallout.note svg{color:var(--warm)}
/* Admin */
.adm-tabs{display:flex;gap:6px;margin-bottom:22px;border-bottom:1px solid var(--border)}
.adm-tabs button{padding:10px 16px;font-weight:600;font-size:14.5px;color:var(--warm);border-bottom:2px solid transparent;margin-bottom:-1px}
.adm-tabs button.on{color:var(--teal-dark);border-bottom-color:var(--teal)}
.list-row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.list-row .sw{width:38px;height:22px;border-radius:20px;background:var(--border-2);position:relative;transition:.18s;flex:0 0 38px;cursor:pointer}
.list-row .sw:after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.list-row .sw.on{background:var(--teal)}.list-row .sw.on:after{left:19px}
.list-row .grow{flex:1;min-width:0}
.list-row .grow b{font-weight:600;font-size:15.5px}
.list-row .grow .sub{font-size:12.5px;color:var(--muted)}
.tbl{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);border-collapse:collapse}
.tbl th{text-align:left;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:.06em;font-size:12.5px;color:var(--muted);padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700}
.tbl td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px}
.tbl tr:last-child td{border-bottom:none}
.tbl .mini{width:120px}
.field{margin-bottom:15px}
.field label{display:block;font-weight:600;font-size:13px;margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1px solid var(--border-2);border-radius:var(--r-sm);outline:none;background:var(--surface);transition:.15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-tint)}
.field .hint{font-size:12.5px;color:var(--muted);margin-top:5px}
.builder-chapter{background:var(--cream);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.builder-chapter .bch{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.builder-chapter .bch input{flex:1;font-weight:600}
.blesson{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;margin-bottom:7px}
.blesson .li{width:26px;height:26px;border-radius:6px;background:var(--teal-tint2);color:var(--teal);display:flex;align-items:center;justify-content:center;flex:0 0 26px}
.blesson .li svg{width:14px;height:14px}
.blesson .lg{flex:1;font-size:13.5px}
.blesson .lg b{font-weight:600;display:block}
.blesson .lg span{font-size:11.5px;color:var(--muted)}
.overlay{position:fixed;inset:0;background:rgba(31,42,45,.42);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .18s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:540px;max-height:90vh;overflow:auto;animation:pop .2s}
.modal.wide{max-width:720px}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-head h2{font-family:'Barlow Condensed';font-weight:700;font-size:21px;text-transform:uppercase}
.modal-body{padding:20px 22px}
.modal-foot{padding:15px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
#toast{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--ink);color:#fff;padding:12px 18px;border-radius:10px;box-shadow:var(--shadow-lg);font-size:14px;font-weight:500;display:flex;align-items:center;gap:9px;animation:su .25s;max-width:340px}
.toast svg{width:17px;height:17px;color:var(--gold);flex:0 0 17px}
.toast.err svg{color:var(--red)}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.foot{text-align:center;padding:36px 0 20px;color:var(--muted);font-size:13px}
.foot .ym{font-family:'Lora';font-style:italic;font-size:17px;color:var(--teal);margin-bottom:6px}
@media(max-width:820px){.lesson-side{display:none}.course-head .side{flex:1}.page{padding:20px 16px}.hero h1{font-size:30px}.topbar .tabs button{padding:8px 10px}}
</style>
</head>

function fbData(){

  DATA.signUp=function(email,pass,name){ return FB.auth.createUserWithEmailAndPassword(email,pass).then(function(cred){ var role=(ADMIN_EMAILS.indexOf(email.toLowerCase())>=0)?'admin':'learner'; return FB.fs.collection('users').doc(cred.user.uid).set({email:email,name:name,role:role,createdAt:Date.now()}); }); };

  DATA.signOut=function(){ return FB.auth.signOut(); };
  DATA.listCourses=function(pub){ return FB.fs.collection('courses').get().then(function(q){ var a=[]; q.forEach(function(d){ var c=d.data(); c.id=d.id; a.push(c); }); if(pub) a=a.filter(function(c){return c.published;}); a.sort(function(x,y){return (x.order||0)-(y.order||0);}); return a; }); };
  DATA.getCourse=function(id){ return FB.fs.collection('courses').doc(id).get().then(function(d){ if(!d.exists) return null; var c=d.data(); c.id=d.id; return c; }); };
  DATA.saveCourse=function(c){ c.updatedAt=Date.now(); if(!c.createdAt) c.createdAt=Date.now(); return FB.fs.collection('courses').doc(c.id).set(c).then(function(){ return c; }); };
  DATA.deleteCourse=function(id){ return FB.fs.collection('courses').doc(id).delete(); };
  DATA.listGuides=function(){ return FB.rtdb.ref('playbook/guides').once('value').then(function(s){ var v=s.val()||{}; return Object.keys(v).map(function(k){ return v[k]; }).filter(function(g){ return g&&!g.deleted; }); }); };
  DATA.getGuide=function(id){ return FB.rtdb.ref('playbook/guides/'+id).once('value').then(function(s){ return s.val(); }); };
  DATA.getProgress=function(uidv,courseId){ return FB.fs.collection('progress').doc(uidv+'__'+courseId).get().then(function(d){ return d.exists?d.data():{completed:{}}; }); };
  DATA.setLessonComplete=function(user,course,lessonId,total){ var id=user.uid+'__'+course.id; var ref=FB.fs.collection('progress').doc(id); var upd={}; upd['completed.'+lessonId]=true; upd.uid=user.uid; upd.email=user.email; upd.name=user.name; upd.courseId=course.id; upd.courseTitle=course.title; upd.total=total; upd.updatedAt=Date.now(); return ref.set({uid:user.uid,email:user.email,name:user.name,courseId:course.id,courseTitle:course.title,total:total,completed:{},createdAt:Date.now()},{merge:true}).then(function(){ return ref.update(upd); }); };
  DATA.courseProgress=function(courseId){ return FB.fs.collection('progress').where('courseId','==',courseId).get().then(function(q){ var a=[]; q.forEach(function(d){ a.push(d.data()); }); return a; }); };
  DATA.listUsers=function(){ return FB.fs.collection('users').get().then(function(q){ var a=[]; q.forEach(function(d){ var u=d.data(); u.uid=d.id; a.push(u); }); return a; }); };
  DATA.setUserRole=function(uid,role){ return FB.fs.collection('users').doc(uid).update({role:role}); };
  DATA.setUserName=function(uid,name){ return FB.fs.collection('users').doc(uid).update({name:name}); };
}

  var sWrap=e('div',{class:'field'}); sWrap.innerHTML='<label>Video source</label>'; var srcSel=e('select'); srcSel.innerHTML='<option value="r2">Cloudflare R2 (paste public link)</option><option value="stream">Cloudflare Stream (paste embed link)</option>'; srcSel.value=L.videoSource||(/cloudflarestream\.com/.test(L.videoUrl||'')?'stream':'r2'); sWrap.appendChild(srcSel); vGroup.appendChild(sWrap);
  var vWrap=e('div',{class:'field'}); var vlab=e('label',{text:'Video link (R2)'}); vWrap.appendChild(vlab); var vin=e('input',{type:'text',value:L.videoUrl||'',placeholder:'https://pub-xxxx.r2.dev/onboarding/welcome.mp4'}); vWrap.appendChild(vin); var vhint=e('div',{class:'hint',text:''}); vWrap.appendChild(vhint); vGroup.appendChild(vWrap);
  var dWrap=e('div',{class:'field'}); dWrap.innerHTML='<label>Duration label (optional)</label>'; var din=e('input',{type:'text',value:L.durationLabel||'',placeholder:'12 min'}); dWrap.appendChild(din); vGroup.appendChild(dWrap);
  var pendingPoster=L.videoPoster||'';
  var pWrap=e('div',{class:'field'}); pWrap.innerHTML='<label>Cover image (optional)</label>'; var pRow=e('div',{style:'display:flex;align-items:center;gap:10px'});
  var pPrev=e('img',{style:'width:96px;height:54px;object-fit:cover;border-radius:6px;border:1px solid var(--border);display:'+(pendingPoster?'block':'none')}); if(pendingPoster) pPrev.src=pendingPoster;
  var pFile=e('input',{type:'file',accept:'image/*',style:'display:none'});
  var pBtn=e('button',{class:'btn btn-ghost btn-sm',html:svg('plus')+'Upload image'}); pBtn.onclick=function(){ pFile.click(); };
  var pClr=e('button',{class:'btn btn-ghost btn-sm',text:'Remove',style:'display:'+(pendingPoster?'inline-flex':'none')}); pClr.onclick=function(){ pendingPoster=''; pPrev.style.display='none'; pClr.style.display='none'; pFile.value=''; };
  pFile.addEventListener('change',function(ev){ var f=ev.target.files&&ev.target.files[0]; if(!f) return; compressPoster(f).then(function(d){ pendingPoster=d; pPrev.src=d; pPrev.style.display='block'; pClr.style.display='inline-flex'; }).catch(function(er){ toast(er.message,true); }); });
  pRow.appendChild(pPrev); pRow.appendChild(pBtn); pRow.appendChild(pClr); pRow.appendChild(pFile); pWrap.appendChild(pRow); pWrap.appendChild(e('div',{class:'hint',text:'Shown as the video preview frame before play. Kept small automatically.'})); vGroup.appendChild(pWrap);
  body.appendChild(vGroup);

  foot.appendChild(cancel); foot.appendChild(savb);

/* ---- REGISTRANTS + PROGRESS ---- */
function admPeople(host){
  var bar=e('div',{class:'sec-head'}); bar.innerHTML='<h2>Registrants</h2>'; host.appendChild(bar);
  var picker=e('div',{class:'field',style:'max-width:340px'}); picker.innerHTML='<label>Show progress for course</label>'; var sel=e('select'); sel.innerHTML='<option value="">All registrants (overview)</option>'; picker.appendChild(sel); host.appendChild(picker);
  var tblHost=e('div',{id:'peopleTbl'}); host.appendChild(tblHost);
  Promise.all([DATA.listUsers(),DATA.listCourses(false)]).then(function(r){
    var users=r[0]||[], courses=r[1]||[];
    courses.forEach(function(co){ var o=e('option',{value:co.id,text:co.title}); sel.appendChild(o); });
    function drawOverview(){
      tblHost.innerHTML='';
      if(!users.length){ tblHost.appendChild(e('div',{class:'empty',html:svg('users')+'<h3>No registrants yet</h3><p>People appear here once they create an account.</p>'})); return; }
      var t=e('table',{class:'tbl'}); t.innerHTML='<thead><tr><th>Name</th><th>Email</th><th>Role</th><th class="mini">Joined</th><th>Manage</th></tr></thead>';
      var tb=e('tbody');
      users.forEach(function(u){
        var tr=e('tr');
        tr.innerHTML='<td><b>'+esc(u.name||'')+'</b></td><td>'+esc(u.email||'')+'</td><td>'+((u.role==='admin')?'<span style="color:var(--teal);font-weight:700">admin</span>':'learner')+'</td><td>'+(u.createdAt?new Date(u.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'')+'</td>';
        var td=e('td',{style:'white-space:nowrap'});
        var isOwner=ADMIN_EMAILS.indexOf((u.email||'').toLowerCase())>=0;
        var isMe=!!(ME&&u.uid===ME.uid);
        if(isOwner){ td.appendChild(e('span',{style:'font-size:12px;color:var(--muted);font-weight:600;margin-right:8px',text:'Owner'})); }
        else if(isMe){ td.appendChild(e('span',{style:'font-size:12px;color:var(--muted);font-weight:600;margin-right:8px',text:'You'})); }
        else {
          var rb=e('button',{class:'btn btn-ghost btn-sm',text:(u.role==='admin'?'Remove admin':'Make admin')});
          rb.onclick=function(){
            var nr=(u.role==='admin')?'learner':'admin';
            DATA.setUserRole(u.uid,nr).then(function(){ u.role=nr; drawOverview(); toast(nr==='admin'?((u.name||u.email)+' is now an admin. It applies the next time they open the Academy.'):((u.name||u.email)+' is back to learner.')); }).catch(function(er){ toast(er.message||'Could not update role.',true); });
          };
          td.appendChild(rb);
        }
        var nb=e('button',{class:'icon-btn',title:'Edit name',html:svg('edit')});
        nb.onclick=function(){
          var body=e('div'); var f=e('div',{class:'field'}); f.innerHTML='<label>Name</label>'; var inp=e('input',{type:'text',value:u.name||''}); f.appendChild(inp); body.appendChild(f);
          var foot=e('div',{class:'modal-foot'}); var sv=e('button',{class:'btn btn-primary',text:'Save'});
          sv.onclick=function(){ var nv=(inp.value||'').trim(); if(!nv){ toast('Name cannot be empty.',true); return; } DATA.setUserName(u.uid,nv).then(function(){ u.name=nv; closeModal(); drawOverview(); toast('Name updated.'); }).catch(function(er){ toast(er.message||'Could not update.',true); }); };
          foot.appendChild(sv); modal('Edit profile',body,foot);
        };
        td.appendChild(nb);
        tr.appendChild(td); tb.appendChild(tr);
      });
      t.appendChild(tb); tblHost.appendChild(t);
    }
    function drawCourse(courseId){
      tblHost.innerHTML=''; var co=null; courses.forEach(function(x){ if(x.id===courseId) co=x; }); if(!co) return;
      var total=courseLessons(co).length;
      DATA.courseProgress(courseId).then(function(rows){
        var byUid={}; rows.forEach(function(p){ byUid[p.uid]=p; });
        var t=e('table',{class:'tbl'}); t.innerHTML='<thead><tr><th>Name</th><th>Email</th><th class="mini">Progress</th><th class="mini">Status</th></tr></thead>';
        var tb=e('tbody');
        users.forEach(function(u){ var p=byUid[u.uid]; var done=p?countDone(p):0; var pc=total?Math.round(done/total*100):0; var status=pc===100?'Complete':(pc>0?'In progress':'Not started');
          var tr=e('tr'); tr.innerHTML='<td><b>'+esc(u.name||'')+'</b></td><td>'+esc(u.email||'')+'</td><td><div class="pbar'+(pc===100?' done':'')+'" style="margin:0"><i style="width:'+pc+'%"></i></div><div style="font-size:11.5px;color:var(--muted);margin-top:4px">'+done+'/'+total+' &middot; '+pc+'%</div></td><td>'+status+'</td>'; tb.appendChild(tr); });
        t.appendChild(tb); tblHost.appendChild(t);
        if(!users.length) tblHost.appendChild(e('div',{class:'empty',html:svg('users')+'<h3>No registrants yet</h3>'}));
      });
    }
    sel.onchange=function(){ if(sel.value) drawCourse(sel.value); else drawOverview(); };
    drawOverview();
  });
}

function loadSDK(done){
  var base='https://www.gstatic.com/firebasejs/10.12.0/';
  var files=['firebase-app-compat.js','firebase-auth-compat.js','firebase-firestore-compat.js','firebase-database-compat.js'];
  var i=0, finished=false;
  function fin(){ if(finished) return; finished=true; try{ done(); }catch(e){} }
  function next(){ try{ if(i>=files.length){ fin(); return; } var s=document.createElement('script'); s.src=base+files[i++]; s.onload=next; s.onerror=next; document.head.appendChild(s); }catch(e){ fin(); } }
  next();
}
