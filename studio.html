<style>
:root{
  --teal:#00818D; --teal-dark:#016671; --teal-deep:#0A5860; --teal-tint:#E5F3F4; --teal-tint2:#F0F8F8;
  --gold:#FFAC27; --gold-dark:#E8951A; --gold-tint:#FFF4E0;
  --ink:#1F2A2D; --warm:#8A7E78; --muted:#9A9089;
  --cream:#FBF7F1; --surface:#FFFFFF; --border:#EAE3DA; --border-2:#DDD4C8; --mid:#4A5A66;
  --green:#2E9E6B; --green-tint:#E7F5EE; --red:#D94F4F; --red-tint:#FBEDED;
  --shadow-sm:0 1px 2px rgba(31,42,45,.05);
  --shadow:0 1px 3px rgba(31,42,45,.06), 0 6px 20px rgba(31,42,45,.07);
  --shadow-lg:0 12px 40px rgba(31,42,45,.16);
  --r:12px; --r-sm:8px; --r-lg:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Barlow',system-ui,sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.cond{font-family:'Barlow Condensed',sans-serif}
.eyebrow{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.11em;font-weight:700}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
img{max-width:100%;display:block}
a{color:var(--teal);text-decoration:none}
::selection{background:var(--teal-tint)}
.hide{display:none !important}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:var(--r-sm);font-weight:600;font-size:14px;transition:.15s;white-space:nowrap;border:1px solid transparent}
.btn svg{width:17px;height:17px}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal-dark)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-gold:hover{background:var(--gold-dark)}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--border-2)}
.btn-ghost:hover{background:var(--cream);border-color:var(--warm)}
.btn-soft{background:var(--teal-tint);color:var(--teal-dark)}
.btn-soft:hover{background:#d5ecec}
.btn-sm{padding:6px 11px;font-size:13px}
.btn-sm svg{width:15px;height:15px}
.btn-lg{padding:13px 22px;font-size:15px}
.icon-btn{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--r-sm);color:var(--warm);transition:.15s}
.icon-btn svg{width:18px;height:18px}
.icon-btn:hover{background:var(--cream);color:var(--ink)}
#shell{display:flex;min-height:100vh}
#sidebar{width:250px;flex:0 0 250px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-brand{display:flex;align-items:center;gap:11px;padding:20px 20px 16px}
.side-brand img{width:36px;height:36px;border-radius:9px;box-shadow:var(--shadow-sm)}
.step.selon{outline:2px solid var(--gold);outline-offset:3px;border-radius:14px}
#bulkbar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:900;background:var(--ink);color:#fff;border-radius:999px;padding:10px 16px;display:flex;gap:12px;align-items:center;box-shadow:var(--shadow-lg);font-size:13.5px}
#bulkbar button{border:0;cursor:pointer;border-radius:999px;padding:7px 14px;font-weight:700;font-size:13px;font-family:inherit}
#bulkbar .bb-del{background:#e05252;color:#fff}
#bulkbar .bb-clear{background:rgba(255,255,255,.14);color:#fff}
.side-brand .wm{line-height:1}
.side-brand .wm b{font-family:'Barlow Condensed';font-weight:800;font-size:19px;letter-spacing:.02em;text-transform:uppercase;display:block;color:var(--ink)}
.side-brand .wm span{font-family:'Barlow Condensed';font-weight:600;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal)}
.side-new{padding:4px 16px 14px}
.side-new .btn{width:100%;justify-content:center}
.nav{padding:6px 12px;flex:1;overflow:auto}
.nav-label{font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:.12em;font-weight:700;font-size:11px;color:var(--muted);padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--r-sm);color:var(--warm);font-weight:600;font-size:14.5px;width:100%;text-align:left;transition:.13s;margin-bottom:1px}
.nav-item svg{width:19px;height:19px;flex:0 0 19px}
.nav-item:hover{background:var(--cream);color:var(--ink)}
.nav-item.active{background:var(--teal-tint);color:var(--teal-dark)}
.nav-item .count{margin-left:auto;font-size:12px;background:var(--cream);color:var(--muted);border-radius:20px;padding:1px 8px;font-weight:600}
.nav-item.active .count{background:#fff;color:var(--teal-dark)}
.side-foot{padding:14px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.side-foot .ym{font-family:'Lora';font-style:italic;font-size:14px;color:var(--warm)}
#main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:16px 30px;border-bottom:1px solid var(--border);background:rgba(251,247,241,.85);backdrop-filter:blur(8px);position:sticky;top:0;z-index:30}
.topbar .search{flex:1;max-width:440px;position:relative}
.topbar .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--muted)}
.topbar .search input{width:100%;padding:9px 12px 9px 37px;border:1px solid var(--border-2);border-radius:var(--r-sm);background:var(--surface);outline:none;transition:.15s}
.topbar .search input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-tint)}
.page{padding:30px;max-width:1180px;width:100%;margin:0 auto;flex:1}
.hero{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:26px;flex-wrap:wrap}
.hero h1{font-family:'Barlow Condensed';font-weight:800;font-size:40px;line-height:1;letter-spacing:.01em;text-transform:uppercase}
.hero h1 em{font-style:italic;color:var(--teal)}
.hero p{color:var(--warm);margin-top:8px;font-size:15.5px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:30px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow-sm)}
.stat .n{font-family:'Barlow Condensed';font-weight:800;font-size:34px;line-height:1;color:var(--teal)}
.stat .l{font-size:12.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-top:4px}
.stat.g .n{color:var(--gold-dark)}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:6px 0 15px}
.sec-head h2{font-family:'Barlow Condensed';font-weight:700;font-size:20px;text-transform:uppercase;letter-spacing:.04em}
.sec-head a{font-weight:600;font-size:13.5px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:18px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);transition:.16s;display:flex;flex-direction:column;position:relative}
.card:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:var(--border-2)}
.card .thumb{aspect-ratio:16/10;background:var(--teal-tint2);position:relative;overflow:hidden;cursor:pointer;border-bottom:1px solid var(--border)}
.card .thumb img{width:100%;height:100%;object-fit:cover;object-position:top}
.card .thumb .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--teal);opacity:.5}
.card .thumb .ph svg{width:38px;height:38px}
.card .thumb .chip{position:absolute;left:10px;top:10px;background:rgba(31,42,45,.72);color:#fff;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;display:flex;align-items:center;gap:5px;backdrop-filter:blur(4px)}
.card .thumb .chip svg{width:12px;height:12px}
.card .body{padding:14px 15px 12px;flex:1;display:flex;flex-direction:column}
.card .body h3{font-weight:600;font-size:15.5px;line-height:1.3;cursor:pointer;color:var(--ink)}
.card .body h3:hover{color:var(--teal)}
.card .body .meta{font-size:12.5px;color:var(--muted);margin-top:auto;padding-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card .body .meta .dot{width:3px;height:3px;border-radius:50%;background:var(--border-2)}
.card .visb{display:inline-flex;align-items:center;gap:4px;font-weight:600}
.card .visb.shared{color:var(--teal)}
.card-actions{display:flex;align-items:center;gap:2px;padding:6px 9px;border-top:1px solid var(--border);background:var(--cream)}
.card-actions .icon-btn{width:30px;height:30px}
.card-actions .icon-btn svg{width:16px;height:16px}
.card-actions .spacer{flex:1}
.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.empty svg{width:56px;height:56px;color:var(--border-2);margin-bottom:14px}
.empty h3{font-family:'Barlow Condensed';font-weight:700;font-size:22px;text-transform:uppercase;color:var(--warm);margin-bottom:6px}
.empty p{max-width:380px;margin:0 auto 18px}
.filters{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.seg{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;gap:2px}
.seg button{padding:6px 14px;border-radius:6px;font-weight:600;font-size:13.5px;color:var(--warm)}
.seg button.on{background:var(--teal);color:#fff}
.filters .spacer{flex:1}
.overlay{position:fixed;inset:0;background:rgba(31,42,45,.42);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .18s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:90vh;overflow:auto;animation:pop .2s}
.modal.wide{max-width:760px}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-head h2{font-family:'Barlow Condensed';font-weight:700;font-size:22px;text-transform:uppercase;letter-spacing:.03em}
.modal-body{padding:22px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.field{margin-bottom:16px}
.field label{display:block;font-weight:600;font-size:13px;margin-bottom:6px;color:var(--ink)}
.field input[type=text],.field textarea,.field select{width:100%;padding:10px 12px;border:1px solid var(--border-2);border-radius:var(--r-sm);outline:none;background:var(--surface);transition:.15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-tint)}
.field .hint{font-size:12.5px;color:var(--muted);margin-top:5px}
.create-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.create-opt{border:1.5px solid var(--border-2);border-radius:var(--r);padding:22px 16px;text-align:center;cursor:pointer;transition:.15s;background:var(--surface)}
.create-opt:hover{border-color:var(--teal);background:var(--teal-tint2);transform:translateY(-2px)}
.create-opt .ic{width:52px;height:52px;border-radius:14px;background:var(--teal-tint);color:var(--teal);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.create-opt .ic svg{width:26px;height:26px}
.create-opt.rec .ic{background:var(--red-tint);color:var(--red)}
.create-opt.up .ic{background:var(--gold-tint);color:var(--gold-dark)}
.create-opt h4{font-weight:700;font-size:15px;margin-bottom:4px}
.create-opt p{font-size:12.5px;color:var(--muted);line-height:1.4}
.editor-top{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:40}
.editor-top .back{display:flex;align-items:center;gap:7px;color:var(--warm);font-weight:600;font-size:14px}
.editor-top .back:hover{color:var(--ink)}
.editor-top .spacer{flex:1}
.editor-top .saved{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
.editor-top .saved .d{width:7px;height:7px;border-radius:50%;background:var(--green)}
.editor-wrap{display:flex;flex:1;min-height:0}
.editor-main{flex:1;min-width:0;overflow:auto;padding:26px 30px 120px}
.doc{max-width:720px;margin:0 auto}
.doc-icon{width:46px;height:46px;border-radius:11px;background:var(--teal-tint);color:var(--teal);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.doc-icon svg{width:24px;height:24px}
.doc-title{font-family:'Barlow Condensed';font-weight:800;font-size:34px;line-height:1.08;outline:none;border-radius:6px;padding:2px 4px;margin:-2px -4px}
.doc-title:focus{background:var(--teal-tint2)}
.doc-title.empty:before{content:attr(data-ph);color:var(--muted)}
.doc-desc{color:var(--warm);font-size:16px;margin-top:10px;outline:none;border-radius:6px;padding:2px 4px;line-height:1.5}
.doc-desc:focus{background:var(--teal-tint2)}
.doc-desc.empty:before{content:attr(data-ph);color:var(--muted)}
.doc-meta{display:flex;align-items:center;gap:14px;color:var(--muted);font-size:13px;margin-top:14px;padding-bottom:22px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.doc-meta .m{display:flex;align-items:center;gap:6px}
.doc-meta .m svg{width:15px;height:15px}
.steps{margin-top:8px}
.step{display:flex;gap:16px;padding:22px 0;border-bottom:1px solid var(--border);position:relative}
.step:last-child{border-bottom:none}
.step .num{flex:0 0 34px;height:34px;border-radius:50%;background:var(--teal);color:#fff;font-family:'Barlow Condensed';font-weight:700;font-size:17px;display:flex;align-items:center;justify-content:center;margin-top:1px}
.step .sc-body{flex:1;min-width:0}
.step .stext{font-size:16px;line-height:1.55;outline:none;border-radius:6px;padding:3px 5px;margin:-3px -5px 12px;min-height:1.4em}
.step .stext:focus{background:var(--teal-tint2)}
.step .stext.empty:before{content:attr(data-ph);color:var(--muted)}
.shot{position:relative;border:1px solid var(--border-2);border-radius:var(--r);overflow:hidden;background:var(--cream);box-shadow:var(--shadow-sm)}
.shot img{width:100%;display:block}
.shot .shot-tools{position:absolute;right:9px;top:9px;display:flex;gap:5px;opacity:0;transition:.15s}
.shot:hover .shot-tools{opacity:1}
.shot .shot-tools button{width:32px;height:32px;border-radius:7px;background:rgba(31,42,45,.78);color:#fff;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.shot .shot-tools button:hover{background:var(--teal)}
.shot .shot-tools button svg{width:16px;height:16px}
.add-shot{border:1.5px dashed var(--border-2);border-radius:var(--r);padding:20px;text-align:center;color:var(--muted);cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:7px;font-weight:600;font-size:13.5px}
.add-shot:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-tint2)}
.add-shot svg{width:22px;height:22px}
.step-side{position:absolute;left:-8px;top:22px;display:flex;flex-direction:column;gap:2px;opacity:0;transition:.13s}
.step:hover .step-side{opacity:1}
.step-side button{width:26px;height:22px;border-radius:5px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.step-side button:hover{background:var(--cream);color:var(--ink)}
.step-side button svg{width:15px;height:15px}
.step-tools{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.step-tools .tbtn{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--warm);font-weight:600;padding:5px 9px;border-radius:6px;border:1px solid transparent}
.step-tools .tbtn:hover{background:var(--cream);color:var(--ink)}
.step-tools .tbtn svg{width:14px;height:14px}
.step-tools .tbtn.del:hover{color:var(--red);background:var(--red-tint)}
.step.callout{align-items:stretch}
.callout-box{flex:1;border-radius:var(--r);padding:14px 16px;display:flex;gap:12px}
.callout-box .ci{flex:0 0 22px}
.callout-box .ci svg{width:22px;height:22px}
.callout-box .ctext{flex:1;outline:none;font-size:14.5px;line-height:1.5}
.callout-box .ctext.empty:before{content:attr(data-ph);opacity:.6}
.tip .callout-box{background:var(--teal-tint2);border:1px solid #cfe8e9}
.tip .callout-box .ci{color:var(--teal)}
.alert .callout-box{background:var(--gold-tint);border:1px solid #f4dfae}
.alert .callout-box .ci{color:var(--gold-dark)}
.note .callout-box{background:var(--cream);border:1px solid var(--border-2)}
.note .callout-box .ci{color:var(--warm)}
.insert{height:14px;position:relative;display:flex;align-items:center;justify-content:center;opacity:0;transition:.13s}
.insert:hover{opacity:1;height:auto;padding:6px 0}
.insert .line{position:absolute;left:0;right:0;top:50%;height:1px;background:var(--teal-tint)}
.insert .menu{position:relative;background:var(--surface);border:1px solid var(--border-2);border-radius:20px;display:flex;gap:2px;padding:3px;box-shadow:var(--shadow-sm)}
.insert .menu button{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--warm);padding:4px 10px;border-radius:16px}
.insert .menu button:hover{background:var(--teal-tint);color:var(--teal-dark)}
.insert .menu button svg{width:13px;height:13px}
.rail{width:290px;flex:0 0 290px;border-left:1px solid var(--border);background:var(--surface);overflow:auto;padding:22px 20px}
.rail h3{font-family:'Barlow Condensed';font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.rail h3 svg{width:17px;height:17px;color:var(--teal)}
.rail .grp{margin-bottom:24px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-row span{font-size:14px;font-weight:500}
.sw{width:38px;height:22px;border-radius:20px;background:var(--border-2);position:relative;transition:.18s;flex:0 0 38px;cursor:pointer}
.sw:after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw.on{background:var(--teal)}
.sw.on:after{left:19px}
.swatches{display:flex;gap:8px;margin-top:8px}
.swatch{width:30px;height:30px;border-radius:8px;border:2px solid transparent;cursor:pointer;position:relative}
.swatch.on{border-color:var(--ink)}
.viewer-top{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:40}
.viewer-top .spacer{flex:1}
.vdoc{max-width:780px;margin:0 auto;padding:36px 30px 60px}
.vdoc .vhead{margin-bottom:28px}
.vdoc .vicon{width:52px;height:52px;border-radius:12px;background:var(--teal-tint);color:var(--teal);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.vdoc .vicon svg{width:26px;height:26px}
.vdoc h1{font-family:'Barlow Condensed';font-weight:800;font-size:38px;line-height:1.08}
.vdoc .vdesc{color:var(--warm);font-size:17px;margin-top:12px;line-height:1.5}
.vdoc .vmeta{display:flex;gap:16px;color:var(--muted);font-size:13.5px;margin-top:16px;flex-wrap:wrap;align-items:center}
.vdoc .vmeta .m{display:flex;align-items:center;gap:6px}
.vdoc .vmeta .m svg{width:15px;height:15px}
.toc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 22px;margin:26px 0}
.toc .tl{font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:13px;color:var(--muted);margin-bottom:10px}
.toc ol{list-style:none;counter-reset:t}
.toc li{counter-increment:t;padding:5px 0;font-size:14.5px;display:flex;gap:10px;cursor:pointer}
.toc li:before{content:counter(t);font-family:'Barlow Condensed';font-weight:700;color:var(--teal);flex:0 0 20px}
.toc li:hover{color:var(--teal)}
.vstep{display:flex;gap:18px;padding:26px 0;border-top:1px solid var(--border);scroll-margin-top:80px}
.vstep .num{flex:0 0 38px;height:38px;border-radius:50%;background:var(--teal);color:#fff;font-family:'Barlow Condensed';font-weight:700;font-size:19px;display:flex;align-items:center;justify-content:center}
.vstep .vb{flex:1;min-width:0}
.vstep .vt{font-size:17px;line-height:1.55;margin-bottom:14px}
.vcallout{padding:16px 18px;border-radius:var(--r);display:flex;gap:13px;font-size:15px;line-height:1.55;margin:20px 0}
.vcallout svg{width:22px;height:22px;flex:0 0 22px}
.vcallout.tip{background:var(--teal-tint2);border:1px solid #cfe8e9}
.vcallout.tip svg{color:var(--teal)}
.vcallout.alert{background:var(--gold-tint);border:1px solid #f4dfae}
.vcallout.alert svg{color:var(--gold-dark)}
.vcallout.note{background:var(--cream);border:1px solid var(--border-2)}
.vcallout.note svg{color:var(--warm)}
.vfoot{text-align:center;padding:44px 0 10px;color:var(--muted);font-size:13px;border-top:1px solid var(--border);margin-top:30px}
.vfoot .ym{font-family:'Lora';font-style:italic;font-size:19px;color:var(--teal);margin-bottom:8px}
.vfoot img{width:30px;height:30px;border-radius:7px;margin:0 auto 10px}
.anno-layer{position:absolute;inset:0;pointer-events:none}
.pb-dot{position:absolute;width:30px;height:30px;transform:translate(-50%,-50%);border-radius:50%;border:3px solid var(--gold);background:rgba(255,172,39,.28);box-shadow:0 0 0 3px rgba(255,255,255,.6)}
.pb-dot.pulse:after{content:'';position:absolute;inset:-3px;border-radius:50%;border:3px solid var(--gold);animation:ring 1.8s ease-out infinite}
@keyframes ring{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.1);opacity:0}}
.pb-box{position:absolute;border:3px solid var(--gold);border-radius:5px;box-shadow:0 0 0 2px rgba(255,255,255,.5),inset 0 0 0 1px rgba(255,255,255,.4)}
.pb-atext{position:absolute;background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:5px 10px;border-radius:7px;transform:translate(-50%,-50%);white-space:nowrap;box-shadow:var(--shadow);max-width:60%}
.pb-arrow{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
#capbar{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:200;background:var(--ink);color:#fff;border-radius:16px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:16px;padding:12px 16px 12px 18px}
#capbar .rec{display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px}
#capbar .rec .d{width:11px;height:11px;border-radius:50%;background:var(--red);animation:blink 1.1s infinite}
@keyframes blink{50%{opacity:.35}}
#capbar .cnt{font-size:13px;color:#b9c2c4;padding-right:4px;border-right:1px solid #3a484b;margin-right:2px}
#capbar .capture{background:var(--gold);color:var(--ink);font-weight:700;padding:11px 20px;border-radius:11px;display:flex;align-items:center;gap:8px}
#capbar .capture:hover{background:var(--gold-dark)}
#capbar .capture svg{width:18px;height:18px}
#capbar .fin{background:#fff;color:var(--ink);font-weight:600;padding:11px 16px;border-radius:11px}
#capbar .fin:hover{background:var(--teal-tint)}
#capflash{position:fixed;inset:0;background:#fff;z-index:199;opacity:0;pointer-events:none}
#capflash.go{animation:flash .32s}
@keyframes flash{0%{opacity:.75}100%{opacity:0}}
.se-wrap{display:flex;flex-direction:column;height:86vh;max-height:86vh}
.se-toolbar{display:flex;align-items:center;gap:6px;padding:12px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.se-tool{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;font-weight:600;font-size:13px;color:var(--warm);border:1px solid var(--border)}
.se-tool svg{width:16px;height:16px}
.se-tool:hover{background:var(--cream);color:var(--ink)}
.se-tool.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.se-toolbar .spacer{flex:1}
.se-canvas{flex:1;overflow:auto;background:repeating-conic-gradient(#f0ece5 0% 25%,#fbf7f1 0% 50%) 50%/22px 22px;display:flex;align-items:flex-start;justify-content:center;padding:24px}
.se-stage{position:relative;box-shadow:var(--shadow-lg);background:#fff;line-height:0;max-width:100%;cursor:crosshair}
.se-stage img{display:block;max-width:100%}
.se-hint{padding:10px 18px;font-size:12.5px;color:var(--muted);border-top:1px solid var(--border);background:var(--cream)}
.blocks{max-width:720px;margin:0 auto}
.cblock{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;box-shadow:var(--shadow-sm);position:relative}
.cblock .ch{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.cblock .ch svg{width:14px;height:14px}
.cblock .ch .spacer{flex:1}
.cblock .cbody{padding:14px 16px}
.cblock .chead-in{font-family:'Barlow Condensed';font-weight:800;font-size:26px;outline:none}
.cblock .ctext-in{outline:none;line-height:1.6;font-size:15.5px}
.cblock .chead-in.empty:before,.cblock .ctext-in.empty:before{content:attr(data-ph);color:var(--muted)}
.cblock .embed{display:flex;align-items:center;gap:12px}
.cblock .embed .th{width:70px;height:46px;border-radius:7px;overflow:hidden;background:var(--teal-tint);flex:0 0 70px;display:flex;align-items:center;justify-content:center;color:var(--teal)}
.cblock .embed .th img{width:100%;height:100%;object-fit:cover}
.cblock .embed b{font-weight:600}
.cblock .embed .mt{font-size:12.5px;color:var(--muted)}
#toast{position:fixed;bottom:26px;right:26px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--ink);color:#fff;padding:12px 18px;border-radius:10px;box-shadow:var(--shadow-lg);font-size:14px;font-weight:500;display:flex;align-items:center;gap:9px;animation:slideup .25s;max-width:340px}
.toast svg{width:17px;height:17px;color:var(--gold);flex:0 0 17px}
.toast.err svg{color:var(--red)}
@keyframes slideup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
#lock{position:fixed;inset:0;z-index:500;background:linear-gradient(160deg,var(--teal-deep),var(--teal));display:flex;align-items:center;justify-content:center;padding:24px}
.lockcard{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:380px;padding:36px 34px;text-align:center}
.lockcard img{width:60px;height:60px;border-radius:14px;margin:0 auto 18px;box-shadow:var(--shadow-sm)}
.lockcard h1{font-family:'Barlow Condensed';font-weight:800;font-size:28px;text-transform:uppercase;letter-spacing:.02em}
.lockcard p{color:var(--warm);margin:6px 0 22px;font-size:14px}
.lockcard input{width:100%;text-align:center;font-size:22px;letter-spacing:.5em;padding:13px;border:1px solid var(--border-2);border-radius:var(--r-sm);outline:none;font-family:'Barlow Condensed';font-weight:700}
.lockcard input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-tint)}
.lockcard .btn{width:100%;justify-content:center;margin-top:14px}
.lockcard .rem{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:14px;font-size:13px;color:var(--warm);cursor:pointer}
.lockcard .err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
.lockcard .ym{font-family:'Lora';font-style:italic;color:var(--teal);margin-top:20px}
@media print{#sidebar,.viewer-top,.editor-top,.rail,#capbar,#toast,.topbar{display:none !important}.vdoc{max-width:100%;padding:0}body{background:#fff}.vstep{break-inside:avoid}}
@media(max-width:1080px){.rail{display:none}.stat-row{grid-template-columns:1fr 1fr}}
@media(max-width:760px){#sidebar{position:fixed;left:-260px;transition:.2s;z-index:60}#sidebar.open{left:0}.create-opts{grid-template-columns:1fr}.page{padding:20px 16px}.stat-row{grid-template-columns:1fr 1fr}.hero h1{font-size:30px}}
</style>
</head>

var SE={ guide:null, step:null, tool:'dot', undo:[], drag:null, _cleanup:null };

function updateHint(){ var h=$('#seHint'); if(!h) return; var map={dot:'Click the image to drop a click target. Drag an existing target to move it.',arrow:'Click and drag to draw an arrow.',box:'Click and drag to draw a highlight box.',text:'Click where you want a label, then type the text.',blur:'Click and drag over anything sensitive. Redaction is permanent once saved.',crop:'Click and drag to select the area to keep, then release to crop.'}; h.textContent=map[SE.tool]||''; }
function redrawSE(){ var ov=$('#seOverlay'); if(!ov) return; ov.innerHTML=''; var fresh=annoLayer(SE.step,SE.guide.settings.dotColor,true); while(fresh.firstChild) ov.appendChild(fresh.firstChild); }
function pctPos(stage,ev){ var r=stage.getBoundingClientRect(); var cx=(ev.touches?ev.touches[0].clientX:ev.clientX); var cy=(ev.touches?ev.touches[0].clientY:ev.clientY); return { x:Math.max(0,Math.min(100,(cx-r.left)/r.width*100)), y:Math.max(0,Math.min(100,(cy-r.top)/r.height*100)) }; }
function bindSE(stage){
  var previewEl=null;
  function down(ev){
    ev.preventDefault(); var p=pctPos(stage,ev);
    if(SE.tool==='dot'){ var hit=findAnno('dot',p); if(hit){ SE.drag={anno:hit}; } else { pushUndo(); SE.step.annotations.push({type:'dot',x:p.x,y:p.y}); redrawSE(); } return; }
    if(SE.tool==='text'){ var t=prompt('Label text:'); if(t){ pushUndo(); SE.step.annotations.push({type:'text',x:p.x,y:p.y,text:t}); redrawSE(); } return; }
    SE.drag={ mode:SE.tool, sx:p.x, sy:p.y, ex:p.x, ey:p.y };
    if(SE.tool!=='arrow'){ previewEl=e('div',{style:'pointer-events:none;position:absolute;'+(SE.tool==='blur'?'background:rgba(31,42,45,.45);border:2px dashed #fff;border-radius:4px':SE.tool==='crop'?'border:2px dashed #00818D;background:rgba(0,129,141,.12)':'border:3px solid '+(SE.guide.settings.dotColor||'#FFAC27')+';border-radius:5px')}); $('#seOverlay').appendChild(previewEl); }
  }
  function move(ev){
    if(!SE.drag) return; var p=pctPos(stage,ev);
    if(SE.drag.anno){ SE.drag.anno.x=p.x; SE.drag.anno.y=p.y; redrawSE(); return; }
    SE.drag.ex=p.x; SE.drag.ey=p.y;
    if(previewEl){ var x=Math.min(SE.drag.sx,p.x), y=Math.min(SE.drag.sy,p.y), w=Math.abs(p.x-SE.drag.sx), h=Math.abs(p.y-SE.drag.sy); previewEl.style.left=x+'%'; previewEl.style.top=y+'%'; previewEl.style.width=w+'%'; previewEl.style.height=h+'%'; }
  }
  function up(){
    if(!SE.drag) return; var d=SE.drag; SE.drag=null; if(previewEl){ previewEl.remove(); previewEl=null; }
    if(d.anno) return;
    var x=Math.min(d.sx,d.ex), y=Math.min(d.sy,d.ey), w=Math.abs(d.ex-d.sx), h=Math.abs(d.ey-d.sy);
    if(d.mode==='box'){ if(w>1&&h>1){ pushUndo(); SE.step.annotations.push({type:'box',x:x,y:y,w:w,h:h,color:SE.guide.settings.dotColor}); redrawSE(); } }
    else if(d.mode==='arrow'){ if(Math.abs(d.ex-d.sx)+Math.abs(d.ey-d.sy)>2){ pushUndo(); SE.step.annotations.push({type:'arrow',x1:d.sx,y1:d.sy,x2:d.ex,y2:d.ey,color:SE.guide.settings.dotColor}); redrawSE(); } }
    else if(d.mode==='blur'){ if(w>1&&h>1) bakeRegion('blur',x,y,w,h); }
    else if(d.mode==='crop'){ if(w>3&&h>3) bakeRegion('crop',x,y,w,h); }
  }
  stage.addEventListener('mousedown',down); window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  stage.addEventListener('touchstart',down,{passive:false}); stage.addEventListener('touchmove',function(ev){ ev.preventDefault(); move(ev); },{passive:false}); stage.addEventListener('touchend',up);
  SE._cleanup=function(){ window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up); };
}
function findAnno(type,p){ var arr=SE.step.annotations; for(var i=arr.length-1;i>=0;i--){ var a=arr[i]; if(a.type===type){ var dx=a.x-p.x, dy=a.y-p.y; if(dx*dx+dy*dy<9) return a; } } return null; }
function pushUndo(){ SE.undo.push(JSON.stringify({ann:SE.step.annotations,img:SE.step.image})); if(SE.undo.length>30) SE.undo.shift(); }
function seUndo(){ if(!SE.undo.length){ toast('Nothing to undo'); return; } var s=JSON.parse(SE.undo.pop()); SE.step.annotations=s.ann; if(s.img) SE.step.image=s.img; var img=$('#seImg'); if(img&&s.img) img.src=s.img; redrawSE(); }
function bakeRegion(mode,x,y,w,h){
  pushUndo(); var img=new Image();
  img.onload=function(){
    var cv=document.createElement('canvas'); cv.width=img.naturalWidth; cv.height=img.naturalHeight; var ctx=cv.getContext('2d'); ctx.drawImage(img,0,0);
    var px=x/100*cv.width, py=y/100*cv.height, pw=w/100*cv.width, ph=h/100*cv.height;
    if(mode==='blur'){ ctx.fillStyle='#1F2A2D'; ctx.fillRect(px,py,pw,ph); ctx.strokeStyle='rgba(255,255,255,.08)'; for(var i=py;i<py+ph;i+=4){ ctx.beginPath(); ctx.moveTo(px,i); ctx.lineTo(px+pw,i); ctx.stroke(); } var out=cv.toDataURL('image/jpeg',0.85); SE.step.image=out; var ie=$('#seImg'); if(ie) ie.src=out; redrawSE(); toast('Area redacted permanently'); }

  };

}
function remapAnno(a,x,y,w,h){ function rx(v){return (v-x)/w*100;} function ry(v){return (v-y)/h*100;} var b=JSON.parse(JSON.stringify(a)); if(a.type==='dot'||a.type==='text'){ b.x=rx(a.x); b.y=ry(a.y); } else if(a.type==='box'){ b.x=rx(a.x); b.y=ry(a.y); b.w=a.w/w*100; b.h=a.h/h*100; } else if(a.type==='arrow'){ b.x1=rx(a.x1); b.y1=ry(a.y1); b.x2=rx(a.x2); b.y2=ry(a.y2); } return b; }

/* ---- lock / boot ---- */
function sha256(str){ if(window.crypto&&crypto.subtle){ var enc=new TextEncoder().encode(str); return crypto.subtle.digest('SHA-256',enc).then(function(buf){ return Array.prototype.map.call(new Uint8Array(buf),function(b){return ('0'+b.toString(16)).slice(-2);}).join(''); }); } return Promise.resolve('plain:'+str); }
var TARGET_HASH=null;
function bootApp(){ $('#lock').classList.add('hide'); $('#shell').classList.remove('hide'); loadDB(); apiBoot(); render(); checkHash(); cloudBoot(); }
function initLock(){
  sha256('1687').then(function(h){ TARGET_HASH=h; });
  var remOn=false;
  var remSw=$('#remSw'); remSw.onclick=function(){ remOn=!remOn; remSw.classList.toggle('on',remOn); };
  function attempt(){
    var val=$('#pin').value.trim(); if(!val){ return; }
    sha256(val).then(function(h){ if(h===TARGET_HASH || val==='1687'){ if(remOn) LS.setItem(PIN_KEY,'1'); bootApp(); } else { $('#pinErr').textContent='Incorrect PIN. Try again.'; $('#pin').value=''; $('#pin').focus(); } });
  }
  $('#unlockBtn').onclick=attempt;
  $('#pin').addEventListener('keydown',function(ev){ if(ev.key==='Enter') attempt(); });
  $('#sideNew').onclick=openCreateModal;
  var pin=$('#pin'); if(pin){ pin.value=''; setTimeout(function(){ pin.value=''; },200); setTimeout(function(){ pin.value=''; },600); }
  if(LS.getItem(PIN_KEY)==='1'){ bootApp(); } else { setTimeout(function(){ var pn=$('#pin'); if(pn){ pn.value=''; pn.focus(); } },250); }
}

function cloudBoot(){
  if(LS.getItem(CLOUD_OFF_KEY)==='1') return;
  var raw=LS.getItem(FB_KEY);
  if(raw){ try{ var cfg=JSON.parse(raw); initFirebase(cfg,true); return; }catch(e){} }
  if(DEFAULT_FB_CONFIG&&DEFAULT_FB_CONFIG.databaseURL){ initFirebase(DEFAULT_FB_CONFIG,true); }
}
function initFirebase(cfg,silent){
  if(!window.firebase||!firebase.initializeApp){ if(!silent) toast('Firebase could not load. Check your connection, then reopen.',true); return; }
  if(!cfg||!cfg.databaseURL){ if(!silent) toast('Cloud config needs at least a databaseURL.',true); return; }
  try{
    if(!CLOUD.app){ CLOUD.app=firebase.initializeApp(cfg); }
    CLOUD.db=firebase.database(); CLOUD.cfg=cfg;
    LS.setItem(FB_KEY,JSON.stringify(cfg)); LS.removeItem(CLOUD_OFF_KEY);
    var proceed=function(){ CLOUD.ready=true; cloudAttach(); cloudPushDirty(); if(!silent) toast('Cloud sync connected'); render(); };
    if(firebase.auth){
      firebase.auth().signInAnonymously().then(function(){ proceed(); }).catch(function(err){
        CLOUD.ready=false;
        var code=(err&&err.code)||''; var msg=(err&&err.message)||'sign-in failed';
        if(code.indexOf('operation-not-allowed')>=0) msg='Enable Anonymous sign-in: Firebase console, Build, Authentication, Sign-in method, Anonymous, Enable.';
        if(!silent) toast('Cloud sign-in failed. '+msg,true); render();
      });
    } else { proceed(); }
  }catch(err){ CLOUD.ready=false; if(!silent) toast('Could not connect: '+err.message,true); }
}
function cloudDisconnect(){
  try{ if(CLOUD.db) CLOUD.db.ref('playbook').off(); }catch(e){}
  try{ if(firebase.auth&&firebase.auth().currentUser) firebase.auth().signOut(); }catch(e){}
  CLOUD.ready=false; CLOUD.attached=false; CLOUD.lastPush={}; LS.removeItem(FB_KEY); LS.setItem(CLOUD_OFF_KEY,'1');
  toast('Cloud sync turned off (this device stays saved locally).'); render();
}
function cloudAttach(){
  if(CLOUD.attached||!CLOUD.db) return; CLOUD.attached=true;
  CLOUD.db.ref('playbook/guides').on('value',function(snap){ mergeCloud('guides',snap.val()||{}); });
  CLOUD.db.ref('playbook/courses').on('value',function(snap){ mergeCloud('courses',snap.val()||{}); });
  CLOUD.db.ref('playbook/meta').on('value',function(snap){ var v=snap.val(); if(v){ DB.meta=DB.meta||{}; if(v.author) DB.meta.author=v.author; } });
}
function mergeCloud(kind,obj){
  var arr=kind==='guides'?DB.guides:DB.courses; var idx={}; arr.forEach(function(x){ idx[x.id]=x; });
  var changed=false, pk=(kind==='guides'?'g':'c');
  Object.keys(obj).forEach(function(id){
    var remote=obj[id]; if(!remote||!remote.id) return;
    if(kind==='guides') normalizeGuide(remote); else normalizeCourse(remote);
    var local=idx[id];
    if(!local){ arr.push(remote); CLOUD.lastPush[pk+id]=remote.updatedAt; changed=true; }
    else if((remote.updatedAt||0)>(local.updatedAt||0)){
      if(isEditing() && ((kind==='guides'&&CTX.editId===id)||(kind==='courses'&&CTX.courseEditId===id))) return; /* don't clobber the doc being typed in */
      for(var k in local){ if(!(k in remote)) delete local[k]; }
      for(var k2 in remote){ local[k2]=remote[k2]; }
      CLOUD.lastPush[pk+id]=remote.updatedAt; changed=true;
    }
  });
  if(changed){ try{ LS.setItem(DB_KEY,JSON.stringify(DB)); }catch(e){} if(!isEditing()) render(); }
}
function cloudScheduleSync(){ if(!CLOUD.ready) return; if(CLOUD.pushT) clearTimeout(CLOUD.pushT); CLOUD.pushT=setTimeout(cloudPushDirty,1200); }
function cloudPushDirty(){
  if(!CLOUD.ready||!CLOUD.db) return;
  try{
    DB.guides.forEach(function(g){ if(CLOUD.lastPush['g'+g.id]!==g.updatedAt){ CLOUD.db.ref('playbook/guides/'+g.id).set(sanitize(g)); CLOUD.lastPush['g'+g.id]=g.updatedAt; } });
    DB.courses.forEach(function(c){ if(CLOUD.lastPush['c'+c.id]!==c.updatedAt){ CLOUD.db.ref('playbook/courses/'+c.id).set(sanitize(c)); CLOUD.lastPush['c'+c.id]=c.updatedAt; } });
    if(DB.meta&&DB.meta.author){ CLOUD.db.ref('playbook/meta').set({author:DB.meta.author}); }
  }catch(e){ toast('Cloud write failed: '+e.message,true); }
}
function cloudRemove(kind,id){ if(!CLOUD.ready||!CLOUD.db) return; try{ CLOUD.db.ref('playbook/'+(kind==='course'?'courses':'guides')+'/'+id).remove(); delete CLOUD.lastPush[(kind==='course'?'c':'g')+id]; }catch(e){} }

/* ================= AI Magic Edit (Anthropic API, direct browser) ================= */
function apiBoot(){
  try{
    var u=new URL(location.href); var k=u.searchParams.get('key');
    if(k){ API.key=k; try{ LS.setItem(API_KEY_LS,k); }catch(e){ API.mem=k; } u.searchParams.delete('key'); history.replaceState({},'',u.toString()); return; }
  }catch(e){}
  API.key=LS.getItem(API_KEY_LS)||API.mem||'';
}
function getApiKey(){ return API.key||LS.getItem(API_KEY_LS)||API.mem||''; }
function callClaude(payload){
  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'x-api-key':getApiKey(), 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body:JSON.stringify(payload)
  }).then(function(r){ return r.json(); });
}
function claudeText(data){ if(!data||!data.content) return ''; return data.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n').trim(); }
function stripQuotes(s){ return (s||'').replace(/^["'\u201c\u2018]+/,'').replace(/["'\u201d\u2019]+$/,'').trim(); }
function imgParts(dataUri){ var m=/^data:(image\/[a-z]+);base64,(.*)$/i.exec(dataUri||''); if(!m) return null; return {media_type:m[1],data:m[2]}; }
function ensureKeyThen(fn){ if(!getApiKey()){ toast('Add your Anthropic API key first (Setup, in the sidebar).',true); openSettings('ai'); return; } fn(); }
function magicEditStep(g,st){
  if(!st.image){ toast('This step has no screenshot to read.',true); return; }
  ensureKeyThen(function(){
    var ip=imgParts(st.image); if(!ip){ toast('Could not read the screenshot.',true); return; }
    toast('Reading the screenshot\u2026');
    callClaude({ model:AI_MODEL, max_tokens:120,
      system:'You write step instructions for software how-to guides at a mortgage company. Given one screenshot of a single step, reply with ONE concise imperative instruction, 14 words or fewer. No preamble, no quotes, no numbering.',
      messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:ip.media_type,data:ip.data}},{type:'text',text:'Current draft (may be blank): "'+(st.text||'')+'". Write the single best instruction for this step.'}]}]
    }).then(function(data){
      if(data&&data.error){ toast('AI error: '+(data.error.message||'request failed'),true); return; }
      var t=stripQuotes(claudeText(data)); if(!t){ toast('No suggestion came back. Try again.',true); return; }
      st.text=t; persistSteps(g); toast('Step updated from screenshot');
    }).catch(function(err){ toast('AI request failed: '+err.message,true); });
  });
}
function magicEditAll(g){
  ensureKeyThen(function(){
    var stepIdx=[]; g.steps.forEach(function(s,i){ if(s.kind==='step') stepIdx.push(i); });
    if(!stepIdx.length){ toast('Add a step first.',true); return; }
    var texts=stepIdx.map(function(i){ return g.steps[i].text||''; });
    toast('Magic Edit is polishing '+texts.length+' step'+(texts.length>1?'s':'')+'\u2026');
    callClaude({ model:AI_MODEL, max_tokens:900,
      system:'You are an editor for step-by-step software training guides at a mortgage company. Rewrite each step into a clear, concise imperative instruction (about 16 words max), preserving the original meaning and any product or field names. Reply ONLY with minified JSON, no markdown or backticks, in the form {"title":"...","description":"...","steps":["...", "..."]} where "steps" has exactly '+texts.length+' entries in the same order. Leave title or description as an empty string if you cannot improve them.',
      messages:[{role:'user',content:'Guide title: "'+(g.title||'')+'". Description: "'+(g.description||'')+'". Steps in order: '+JSON.stringify(texts)}]
    }).then(function(data){
      if(data&&data.error){ toast('AI error: '+(data.error.message||'request failed'),true); return; }
      var raw=claudeText(data).replace(/```json/gi,'').replace(/```/g,'').trim();
      var parsed; try{ parsed=JSON.parse(raw); }catch(e){ toast('AI reply was not readable. Try again.',true); return; }
      if(parsed.steps&&parsed.steps.length){ parsed.steps.forEach(function(t,n){ if(stepIdx[n]!=null&&t) g.steps[stepIdx[n]].text=String(t); }); }
      if(parsed.title&&!g.title) g.title=String(parsed.title);
      if(parsed.description&&!g.description) g.description=String(parsed.description);
      persistSteps(g);
      var host=$('#content'); if(host&&VIEW==='editor'){ render(); }
      toast('Magic Edit polished '+ (parsed.steps?parsed.steps.length:0) +' steps');
    }).catch(function(err){ toast('AI request failed: '+err.message,true); });
  });
}

/* ================= Settings modal (Cloud + AI) ================= */
function openSettings(focus){
  var body=e('div');
  /* Cloud */
  var cloudSec=e('div',{class:'field'});
  cloudSec.innerHTML='<label style="display:flex;align-items:center;gap:8px;font-size:15px">'+svg('layers')+'Cloud sync (Realtime Database)</label>';
  var status=e('div',{class:'hint',style:'margin-bottom:10px'});
  status.innerHTML=CLOUD.ready
    ? 'Connected'+(CLOUD.cfg&&CLOUD.cfg.projectId?' to <b>'+esc(CLOUD.cfg.projectId)+'</b>':'')+'. Guides and courses sync across every device that opens this file with the same config.'
    : 'Off. Everything is saved on this device only. Paste your Firebase config below to share guides across the team in real time.';
  cloudSec.appendChild(status);
  if(!CLOUD.ready){
    var ta=e('textarea',{rows:'7',placeholder:'Paste the firebaseConfig object from the Firebase console here, e.g.\\n{\\n  "apiKey": "...",\\n  "authDomain": "partners-playbook.firebaseapp.com",\\n  "databaseURL": "https://partners-playbook-default-rtdb.firebaseio.com",\\n  "projectId": "partners-playbook"\\n}',style:'width:100%;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;line-height:1.5'});
    cloudSec.appendChild(ta);
    var connect=e('button',{class:'btn btn-primary btn-sm',style:'margin-top:10px',html:svg('link')+'Connect cloud sync'});
    connect.onclick=function(){ var cfg=parseCfg(ta.value); if(!cfg){ toast('That does not look like a valid Firebase config. Check the braces and quotes.',true); return; } initFirebase(cfg,false); closeModal(); };
    cloudSec.appendChild(connect);
    var help=e('details',{style:'margin-top:12px'});
    help.innerHTML='<summary style="cursor:pointer;font-weight:600;font-size:13px;color:var(--teal-dark)">How to create the project (2 minutes)</summary><ol style="margin:10px 0 0 18px;font-size:13px;line-height:1.7;color:var(--warm)"><li>Go to console.firebase.google.com and create a project named <b>partners-playbook</b>.</li><li>Build &rarr; Realtime Database &rarr; Create Database (start in test mode).</li><li>Project Settings &rarr; add a Web app &rarr; copy the <b>firebaseConfig</b> object.</li><li>Paste it above and press Connect.</li></ol><div style="font-size:12.5px;color:var(--muted);margin-top:8px">Test-mode rules ({".read":true,".write":true}) work for an internal team. Tighten later with anonymous auth if needed.</div>';
    cloudSec.appendChild(help);
  } else {
    var dis=e('button',{class:'btn btn-ghost btn-sm',style:'margin-top:6px',html:svg('x')+'Turn off cloud sync'});
    dis.onclick=function(){ cloudDisconnect(); closeModal(); };
    cloudSec.appendChild(dis);
  }
  body.appendChild(cloudSec);
  body.appendChild(e('div',{style:'height:1px;background:var(--border);margin:20px 0'}));
  /* AI */
  var aiSec=e('div',{class:'field'});
  aiSec.innerHTML='<label style="display:flex;align-items:center;gap:8px;font-size:15px">'+svg('sparkle')+'AI Magic Edit (Anthropic API)</label>';
  var hasKey=!!getApiKey();
  var aiStatus=e('div',{class:'hint',style:'margin-bottom:10px'});
  aiStatus.innerHTML=hasKey?'A key is saved on this device. Magic Edit and "Describe from screenshot" are ready.':'Add an Anthropic API key to turn on Magic Edit. The key stays on this device and is never sent anywhere except Anthropic.';
  aiSec.appendChild(aiStatus);
  var keyInput=e('input',{type:'password',placeholder:hasKey?'\u2022\u2022\u2022\u2022\u2022\u2022 (saved). Paste a new key to replace':'sk-ant-...',style:'width:100%'});
  aiSec.appendChild(keyInput);
  var brow=e('div',{style:'display:flex;gap:8px;margin-top:10px'});
  var saveK=e('button',{class:'btn btn-primary btn-sm',html:svg('check')+'Save key'});
  saveK.onclick=function(){ var v=keyInput.value.trim(); if(!v){ toast('Paste a key first.',true); return; } API.key=v; try{ LS.setItem(API_KEY_LS,v); }catch(e){ API.mem=v; } toast('API key saved on this device'); closeModal(); };
  brow.appendChild(saveK);
  if(hasKey){ var clr=e('button',{class:'btn btn-ghost btn-sm',html:svg('x')+'Remove key'}); clr.onclick=function(){ API.key=''; API.mem=''; LS.removeItem(API_KEY_LS); toast('API key removed'); closeModal(); }; brow.appendChild(clr); }
  aiSec.appendChild(brow);
  aiSec.appendChild(e('div',{class:'hint',style:'margin-top:10px',html:'Tip: you can also open the tool with <code>?key=sk-ant-...</code> in the URL. The key is saved and the URL is cleaned automatically. Uses model <b>'+AI_MODEL+'</b>.'}));
  body.appendChild(aiSec);
  modal('Cloud & AI setup',body,null,'wide');
  setTimeout(function(){ if(focus==='ai') keyInput.focus(); },40);
}
function parseCfg(txt){
  if(!txt) return null; var s=txt.trim();
  var i=s.indexOf('{'); if(i>0) s=s.slice(i);
  var j=s.lastIndexOf('}'); if(j>=0) s=s.slice(0,j+1);
  try{ return JSON.parse(s); }catch(e){}
  try{ /* tolerate JS object literal with unquoted keys / trailing commas */
    var js=s.replace(/([,{]\s*)([A-Za-z0-9_]+)\s*:/g,'$1"$2":').replace(/,\s*}/g,'}').replace(/'/g,'"');
    return JSON.parse(js);
  }catch(e2){ return null; }
}
